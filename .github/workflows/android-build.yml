name: Build Android APK
 
on:
  push:
    branches:
      - implement-weather
  workflow_dispatch:
 
jobs:
  build:
    runs-on: windows-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
 
      - name: Show .NET info
        run: dotnet --info
 
      - name: Install MAUI workload
        run: dotnet workload install maui
 
      - name: Restore
        run: dotnet restore
 
      - name: Publish APK
        run: dotnet publish AuroraForecast.csproj -f net10.0-android -c Release -p:AndroidPackageFormat=apk
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            **/bin/Release/net10.0-android/publish/*.apk