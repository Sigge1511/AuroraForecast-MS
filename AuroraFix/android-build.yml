name: Build and Release Android APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore AuroraFix/AuroraForecast.csproj

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v -keystore aurora.keystore -alias aurora-nyckel -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -keypass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -dname "CN=Maja, O=Dev, C=SE"

      - name: Publish and Sign APK
        run: >
          dotnet publish AuroraFix/AuroraForecast.csproj 
          -f net10.0-android 
          -c Release 
          -p:AndroidPackageFormat=apk 
          -o ./publish 
          -p:AndroidKeyStore=true 
          -p:AndroidSigningKeyStore=../aurora.keystore 
          -p:AndroidSigningKeyAlias=aurora-nyckel 
          -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} 
          -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload Artifact (Internal GH)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./publish/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}